name: Build Cricket Dashboard Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - 'Downloads/cric/cricket_dashboard/**'
      - '.github/workflows/build-cricket-windows-exe.yml'

jobs:
  build-windows-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Downloads/cric/cricket_dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pywebview

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --windowed --name CricketDashboard --add-data "app.py;." --add-data "src;src" desktop/windows/launcher.py

      - name: Package EXE folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/CricketDashboard/*" -DestinationPath "dist/CricketDashboard-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CricketDashboard-windows-exe
          path: Downloads/cric/cricket_dashboard/dist/CricketDashboard-windows.zip
          retention-days: 14
