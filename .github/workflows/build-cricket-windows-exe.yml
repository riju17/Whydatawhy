name: Build Cricket Dashboard Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - 'Downloads/cric/cricket_dashboard/**'
      - '.github/workflows/build-cricket-windows-exe.yml'

jobs:
  build-windows-exe:
    runs-on: windows-latest
    env:
      PROJECT_DIR: Downloads/cric/cricket_dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify project files
        shell: pwsh
        run: |
          Get-ChildItem -Path "$env:GITHUB_WORKSPACE/$env:PROJECT_DIR" -Recurse | Select-Object -First 80 | Format-Table FullName
          if (!(Test-Path "$env:GITHUB_WORKSPACE/$env:PROJECT_DIR/desktop/windows/launcher.py")) {
            throw "launcher.py not found at expected path"
          }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "$env:PROJECT_DIR/requirements.txt" pyinstaller pywebview

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --windowed --name CricketDashboard --copy-metadata streamlit --add-data "$env:PROJECT_DIR/app.py;." --add-data "$env:PROJECT_DIR/src;src" "$env:PROJECT_DIR/desktop/windows/launcher.py"

      - name: Package EXE folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/CricketDashboard/*" -DestinationPath "dist/CricketDashboard-windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CricketDashboard-windows-exe
          path: dist/CricketDashboard-windows.zip
          retention-days: 14
